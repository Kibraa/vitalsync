name: VitalSync CI/CD Pipeline

# Declencheurs : push sur develop + Pull Request vers main
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  # ========================================
  # ETAPE 1 : Lint & Tests (6 pts)
  # ========================================
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dependances
        run: npm install

      - name: Lint avec ESLint
        run: npx eslint . --ext .js || true

      - name: Execution des tests unitaires (Jest)
        run: npm test

  # ========================================
  # ETAPE 2 : Build Docker (6 pts)
  # ========================================
  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Conversion du nom de repo en lowercase
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build et push de l'image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest

      - name: Build et push de l'image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest

  # ========================================
  # ETAPE 3 : Deploiement staging (8 pts)
  # ========================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Deploiement en environnement staging via Docker Compose
        run: |
          docker compose up -d --build

      - name: Attente du demarrage des services
        run: sleep 10

      - name: Health check du back-end
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check echoue ! Code HTTP: $STATUS"
            docker compose logs backend
            exit 1
          fi
          echo "Health check reussi (HTTP 200)"

      - name: Arret des services staging
        if: always()
        run: docker compose down
